<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
    <style>
        input{
            display:block;
            width: 250px;
            height: 20px;
            text-emphasis-color: white;
        }
        button{
            text-align:center;
            width: 100px;
            height: 30px;
            color: white;
            background-color: darkred;
            border-radius: 10px;
            margin-left: -15px;
        }
        ::placeholder{
            padding-left: 25%;
            font-size:medium;
        }
        h4{
            color: rgba(255, 0, 0, 0.53);
        }
        body{
            background: linear-gradient(to left , black, darkred);
        }
        .Main{
            border-radius: 50px;
            width: 300px;
            height: 350px;
            padding-left: 30px;
            margin-left: 750px;
            margin-top: 100px;
            font-size: x-large;
        }
        .Box{
            background-color: rgb(247, 6, 6);
            width: 500px;
            height: 400px;
            border-radius: 50px;
            margin-left: 50px;
            margin-top: -400px;
        }
        .Box img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <div class="Main">
        <h4>Login Here</h4>
        <form>
            <input type="text" placeholder="Enter name">
            <br>
            <input type="email" placeholder="Enter email id">
            <br>
            <input type="password" placeholder="Enter password">
            <br>
            <input type="number" placeholder="Enter number">
            <br>
            <button>Login</button>
            <br>
        </form>
    </div>
    <div class="Box">
        <img src="https://images.unsplash.com/photo-1627873649417-c67f701f1949?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fG5ldGZsaXh8ZW58MHx8MHx8fDA%3D">
    </div>
</body>
</html>
