<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <style>
        body{
            background-color: darkred;
            
        }
        .Container{
            justify-content: center;
            display: flex;
            padding-top: 250px;

        }
        input{
            display: block;
            width: 250px;
            height: 20px;
            text-align: center;
            
        }
        button{
            width: 260px;
            height: 40px;
            background-color: darkred;
        }
        .box{
            width: 400px;
            height: 250px;
            border: 2px solid black;
            border-radius: 30px;
            background: linear-gradient(to left , darkred, black);
            margin: 50px auto;
            text-align: center;
            line-height: 200px;
            margin-top: -175px;
        }
    </style>
</head>
<body>
    <div class="Container">
        <form>
        <input type="email" placeholder="Enter email id">
        <br>
        <input type="password" placeholder="Create a strong password">
        <br>
        <button>SignUp</button>
        </form>
    </div>
    <div class="box">

    </div>
</body>
</html>
