<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>
       <abbr title="HyperText Markup Language">HTML</abbr> is used to create web pages.
       <!--abbr: Defines abbreviation or acronym-->
    </p>

    <p>
       <abbr title="Cascading Style Sheets">CSS</abbr> is used for styling web pages.
    </p>
    <q>JavaScript</q>
    <!--q: Represents text quoted from another source by adding quotation mark (" ")-->
    <br>
    <br>
    <small>React</small>
    <!--small: Displays text in relatively smaller font-size-->
    <br>
    <br>
    <mark>Github</mark>
    <!--mark: Highlights text-->
    <br><br>
    <strong>Tailwind CSS</strong>
    <!--strong: Displays text in bold-->
    <br>
    <br>
    <em>Python</em>
    <!--em: Displays text in the italic or emphasized format-->
    <sub>SQL</sub>
    <!--sub: Displays text as subscript-->
    <sup>MongoDB</sup>
    <!--sup: Displays text as superscript-->
    <br>
    <br>
    <span>Node.js</span>
    <!--span: Provides styling to text-->
    <br>
    <!--br: Breaks line of text-->
    <br>
    This is <del>deleted</del> content.
    <!--Strikethrough text-->
    Non-breaking space

&nbsp;

&#160;


    
</body>
</html>
